name: zone_zap
description: Location-based reminders that work in the background.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Location
  geolocator: ^10.1.0

  # Notifications
  flutter_local_notifications: ^17.2.1+2

  # Background service (KEY new dependency)
  flutter_background_service: ^5.0.5

  # Networking
  http: ^1.2.1

  # Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true